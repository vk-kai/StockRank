version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ../backend 
      dockerfile: ../docker/backend.Dockerfile
    container_name: a-stock-backend
    ports:
      - "5000:5000"
    volumes:
      - ../backend:/app/backend
      - ../config:/app/config
      - ../data:/app/data
      - ../logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    networks:
      - stock-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: a-stock-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ../logs/nginx:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - stock-network

networks:
  stock-network:
    driver: bridge
