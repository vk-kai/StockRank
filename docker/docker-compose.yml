version: '3.8'

services:
  backend:
    build:
      context: ../backend 
      dockerfile: ../docker/backend.Dockerfile
    container_name: a-stock-backend
    ports:
      - "5000:5000"
    environment:
      - THS_BROWSER_PATH=/usr/bin/chromium
    shm_size: "512mb"
    volumes:
      - ../backend:/app/backend
      - ../config:/app/config
      - ../data:/app/data
      - ../logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    restart: unless-stopped
    networks:
      - stock-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: a-stock-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ../logs/nginx:/var/log/nginx
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - stock-network

networks:
  stock-network:
    driver: bridge
